    <!-- ===== FIXED: DYNAMIC BRANDS SCRIPT ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set current category
            window.currentCategory = 'Earphones';
            
            // Small delay to ensure products are loaded
            setTimeout(async function() {
                try {
                    // Get all products and filter for Earphones
                    const allProducts = await DataLoader.loadAllProducts();
                    const earphonesProducts = allProducts.filter(p => p.category === 'Earphones');
                    
                    console.log('Earphones Products found:', earphonesProducts.length);
                    
                    // Get unique brands from actual Earphones products
                    const availableBrands = [...new Set(earphonesProducts.map(p => p.brand))];
                    
                    console.log('Earphones Brands found:', availableBrands);
                    
                    // Always show 'All' first, then all available brands
                    const categories = ['All', ...availableBrands];
                    
                    // Update category buttons
                    const container = document.getElementById('categoryContainer');
                    if (!container) return;
                    
                    container.innerHTML = categories.map(cat => `
                        <button class="category-btn ${cat === 'All' ? 'active' : ''}" data-category="${cat}">
                            ${cat}
                        </button>
                    `).join('');
                    
                    // Add click handlers
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                            
                            // Call filterProducts from main.js
                            if (window.filterProducts) {
                                window.filterProducts(this.dataset.category);
                            } else {
                                console.error('filterProducts not found');
                                
                                // Fallback: direct filter
                                const category = this.dataset.category;
                                if (category !== 'All') {
                                    window.currentFilter = category;
                                    window.currentPage = 1;
                                    if (typeof renderProducts === 'function') {
                                        renderProducts();
                                    }
                                } else {
                                    window.currentFilter = 'All';
                                    window.currentPage = 1;
                                    if (typeof renderProducts === 'function') {
                                        renderProducts();
                                    }
                                }
                            }
                        });
                    });
                    
                } catch (error) {
                    console.error('Error loading categories:', error);
                    
                    // Fallback to at least show All button
                    const container = document.getElementById('categoryContainer');
                    if (container) {
                        container.innerHTML = '<button class="category-btn active" data-category="All">All</button>';
                    }
                }
            }, 300); // Small delay to ensure DataLoader is ready
        });
    </script>
