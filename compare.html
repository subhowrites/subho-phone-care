<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Compare Products - Sharma Mobile Store</title>
    <meta name="description" content="Compare smartphones side by side at Sharma Mobile Store. Make informed decision with detailed specification comparison.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        /* ===== COMPARE PAGE SPECIFIC STYLES ===== */
        .compare-page {
            padding: 20px 0 40px;
        }
        
        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .compare-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .compare-header h1 span {
            background: #61dac2;
            color: #0f172a;
            font-size: 16px;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
        }
        
        .compare-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .compare-action-btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .compare-action-btn.primary {
            background: #0f172a;
            color: white;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }
        
        .compare-action-btn.primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
        
        .compare-action-btn.secondary {
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }
        
        .compare-action-btn.secondary:hover {
            background: #e2e8f0;
        }
        
        /* Empty state */
        .compare-empty {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        .compare-empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .compare-empty h2 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 10px;
        }
        
        .compare-empty p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .compare-empty-btn {
            display: inline-block;
            padding: 14px 32px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .compare-empty-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
        }
        
        /* Comparison table */
        .compare-table-wrapper {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            overflow-x: auto;
            margin-bottom: 30px;
        }
        
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        .compare-table th {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #f1f5f9;
            background: #f8fafc;
        }
        
        .compare-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        
        .compare-table tr:last-child td {
            border-bottom: none;
        }
        
        .compare-table .spec-label {
            font-weight: 600;
            color: #64748b;
            width: 150px;
            background: #f8fafc;
        }
        
        .compare-table .spec-value {
            color: #0f172a;
            text-align: center;
        }
        
        /* Product cards in table */
        .compare-product-card {
            text-align: center;
        }
        
        .compare-product-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin: 0 auto 15px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #f1f5f9;
        }
        
        .compare-product-name {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .compare-product-price {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }
        
        .compare-product-remove {
            background: none;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .compare-product-remove:hover {
            background: #ef4444;
            color: white;
        }
        
        .compare-product-remove:active {
            transform: scale(0.95);
        }
        
        /* Better/worse indicators */
        .spec-value.better {
            color: #059669;
            font-weight: 600;
        }
        
        .spec-value.better::after {
            content: ' ↑';
            font-size: 14px;
        }
        
        .spec-value.worse {
            color: #dc2626;
        }
        
        .spec-value.worse::after {
            content: ' ↓';
            font-size: 14px;
        }
        
        /* Loading state */
        .compare-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        
        .compare-loading .spinner {
            margin-bottom: 20px;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .compare-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .compare-header h1 {
                font-size: 24px;
            }
            
            .compare-actions {
                width: 100%;
            }
            
            .compare-action-btn {
                flex: 1;
                text-align: center;
                justify-content: center;
            }
            
            .compare-product-image {
                width: 80px;
                height: 80px;
            }
            
            .compare-product-name {
                font-size: 14px;
            }
            
            .compare-product-price {
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .compare-table th,
            .compare-table td {
                padding: 12px 10px;
            }
            
            .compare-product-image {
                width: 60px;
                height: 60px;
                padding: 5px;
            }
            
            .compare-product-name {
                font-size: 12px;
            }
            
            .compare-product-price {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 📌 STICKY TOP AREA - FIXED ON ALL PAGES -->

        <!-- TOP INFO BAR -->
        <div class="top-info-bar">
            <div class="container">
                <span class="shop-name">Subho Mobile Shop</span>
                <span class="separator">|</span>
                <span class="shop-address">Main Road, Malkangiri</span>
            </div>
        </div>
        
        <!-- MAIN HEADER BAR -->
        <div class="main-header">
            <div class="container">
                <div class="header-content">
                    <!-- LEFT: MENU ICON + HOME BUTTON -->
                    <div class="left-nav">
                        <div class="menu-icon" id="menuToggle">☰</div>
                        
                    </div>
                    
                    <!-- CENTER: LOGO/SHOP NAME -->
                    <div class="logo">
                        <a href="index.html">📱 SUBHO MOBILE SHOP</a>
                    </div>
                    
                    <!-- RIGHT: SEARCH WRAPPER + CALL ICON -->
                    <div class="right-nav">
                        <div class="search-wrapper">
                            <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
                            <span class="search-submit">🔍</span>

        <!-- SEARCH SUGGESTIONS -->
        <div class="search-suggestions" id="searchSuggestions"></div>

        <!-- 🍔 MENU DROPDOWN -->
        <div class="menu-dropdown" id="menuDropdown">
            <a href="index.html" class="menu-item">
                <span>🏠</span> Home
            </a>
            <a href="about.html" class="menu-item">
                <span>📋</span> About
            </a>
            <a href="contact.html" class="menu-item">
                <span>📞</span> Contact
            </a>
        </div>
    </header>

    <main class="compare-page">
        <div class="container">
            <div class="nav-buttons">
                <a href="#" onclick="history.back(); return false;" 
                   style="background-color: #059669; color: white; padding: 12px 24px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: 600; border: 1px solid #047857; margin-right: 10px; transition: all 0.3s ease;"
                   onmouseover="this.style.backgroundColor='#047857'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 15px rgba(5, 150, 105, 0.4)';"
                   onmouseout="this.style.backgroundColor='#059669'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 10px rgba(0,0,0,0.2)';">
                    ← Back
                </a>
                <a href="index.html" 
                   style="background-color: #0f172a; color: white; padding: 12px 24px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: 600; border: 1px solid #1e293b; transition: all 0.3s ease;"
                   onmouseover="this.style.backgroundColor='#1e293b'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 15px rgba(15, 23, 42, 0.4)';"
                   onmouseout="this.style.backgroundColor='#0f172a'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 10px rgba(0,0,0,0.2)';">
                    🏠 Home
                </a>

        </div>


            <!-- Compare Content -->
            <div id="compareContent">

    <!-- FOOTER -->

            <div class="footer-content">
                <div class="footer-section">

                    </ul>

                    <p>📞 +91 98765 43210</p>
                    <p>📧 info@sharmamobile.com</p>
                </div>
                <div class="footer-section">
                    <h4>Follow Us</h4>
                    <div class="social-icons">
                        <a href="#">📘</a>
                        <a href="#">📷</a>
                        <a href="#">🐦</a>
                    </div>

    <script src="js/data-loader.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // ===== COMPARE PAGE LOGIC =====
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComparePage();
        });
        
        async function loadComparePage() {
            const container = document.getElementById('compareContent');
            
            // Get product IDs from URL
            const urlParams = new URLSearchParams(window.location.search);
            const idsParam = urlParams.get('ids');
            
            if (!idsParam) {
                showEmptyState(container);
                return;
            }
            
            const productIds = idsParam.split(',');
            
            if (productIds.length < 2) {
                showEmptyState(container, 'Select at least 2 products to compare');
                return;
            }
            
            // Load products
            const products = await DataLoader.loadProducts(productIds);
            const validProducts = products.filter(p => p !== null);
            
            if (validProducts.length < 2) {
                showEmptyState(container, 'Some products could not be loaded');
                return;
            }
            
            renderComparePage(container, validProducts);
        }
        
        function showEmptyState(container, message = 'No products selected for comparison') {
            container.innerHTML = `
                <div class="compare-empty">
                    <div class="compare-empty-icon">🔍</div>
                    <h2>No Products to Compare</h2>
                    <p>${message}</p>
                    <a href="products.html" class="compare-empty-btn">Browse Products</a>
                </div>
            `;
        }
        
        function renderComparePage(container, products) {
            // Get all unique spec keys
            const specKeys = new Set();
            products.forEach(product => {
                if (product.specs) {
                    Object.keys(product.specs).forEach(key => specKeys.add(key));
                }
            });
            
            // Convert to array and sort
            const specList = Array.from(specKeys);
            
            // Create header
            let headerHTML = `
                <div class="compare-header">
                    <h1>
                        Compare Products
                        <span>${products.length} items</span>
                    </h1>
                    <div class="compare-actions">
                        <a href="products.html" class="compare-action-btn secondary">
                            ← Add More
                        </a>
                        <button class="compare-action-btn primary" onclick="window.print()">
                            🖨️ Print Comparison
                        </button>
                    </div>
                </div>
            `;
            
            // Create table
            let tableHTML = `
                <div class="compare-table-wrapper">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th>Specifications</th>
                                ${products.map(product => `
                                    <th>
                                        <div class="compare-product-card">
                                            <img src="${product.image}" alt="${product.name}" class="compare-product-image" onerror="this.src='https://via.placeholder.com/120'">
                                            <div class="compare-product-name">${product.name}</div>
                                            <div class="compare-product-price">${product.price || 'Contact for price'}</div>
                                            <button class="compare-product-remove" onclick="removeFromComparison('${product.id}')">
                                                ✕ Remove
                                            </button>
                                        </div>
                                    </th>
                                `).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Price row (if not in specs) -->
                            ${!specList.includes('Price') ? `
                                <tr>
                                    <td class="spec-label">Price</td>
                                    ${products.map(product => `
                                        <td class="spec-value">${product.price || 'Contact for price'}</td>
                                    `).join('')}
                                </tr>
                            ` : ''}
                            
                            <!-- All specs -->
                            ${specList.map(key => `
                                <tr>
                                    <td class="spec-label">${key}</td>
                                    ${products.map(product => {
                                        const value = product.specs?.[key] || '—';
                                        return `<td class="spec-value">${value}</td>`;
                                    }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = headerHTML + tableHTML;
            
            // Highlight better/worse values (optional)
            highlightComparisons(products, specList);
        }
        
        function highlightComparisons(products, specList) {
            // Simple numeric comparison for common specs
            const numericSpecs = ['RAM', 'Storage', 'Battery', 'Camera', 'Price'];
            
            specList.forEach(key => {
                if (numericSpecs.includes(key)) {
                    const values = products.map(p => {
                        const val = p.specs?.[key] || '';
                        // Extract numbers
                        const num = parseInt(val.replace(/[^0-9]/g, ''));
                        return { product: p, value: val, number: num || 0 };
                    });
                    
                    // Find max and min
                    const maxValue = Math.max(...values.map(v => v.number));
                    const minValue = Math.min(...values.map(v => v.number));
                    
                    // For price, lower is better
                    const isPrice = key === 'Price';
                    
                    values.forEach((v, index) => {
                        if (v.number === maxValue && !isPrice) {
                            // Better for most specs
                            const cell = document.querySelector(`.compare-table tbody tr:contains("${key}") td.spec-value:nth-child(${index + 2})`);
                            if (cell) cell.classList.add('better');
                        } else if (v.number === minValue && isPrice) {
                            // Better for price (lower)
                            const cell = document.querySelector(`.compare-table tbody tr:contains("${key}") td.spec-value:nth-child(${index + 2})`);
                            if (cell) cell.classList.add('better');
                        } else if (v.number === minValue && !isPrice) {
                            // Worse for most specs
                            const cell = document.querySelector(`.compare-table tbody tr:contains("${key}") td.spec-value:nth-child(${index + 2})`);
                            if (cell) cell.classList.add('worse');
                        } else if (v.number === maxValue && isPrice) {
                            // Worse for price (higher)
                            const cell = document.querySelector(`.compare-table tbody tr:contains("${key}") td.spec-value:nth-child(${index + 2})`);
                            if (cell) cell.classList.add('worse');
                        }
                    });
                }
            });
        }
        
        // Helper for contains selector
        document.querySelectorAll = function(selector) {
            if (selector.includes(':contains(')) {
                const match = selector.match(/:contains\("([^"]+)"\)/);
                if (match) {
                    const text = match[1];
                    const baseSelector = selector.replace(/:contains\("[^"]+"\)/, '');
                    const elements = document.querySelectorAll(baseSelector);
                    return Array.from(elements).filter(el => el.textContent.includes(text));
                }
            }
            return document.querySelectorAll(selector);
        };
        
        function removeFromComparison(productId) {
            // Get current list from URL
            const urlParams = new URLSearchParams(window.location.search);
            const idsParam = urlParams.get('ids');
            
            if (!idsParam) return;
            
            let productIds = idsParam.split(',');
            productIds = productIds.filter(id => id !== productId);
            
            if (productIds.length < 2) {
                // Redirect to products page
                window.location.href = 'products.html';
            } else {
                // Reload with new IDs
                window.location.href = `compare.html?ids=${productIds.join(',')}`;
            }
        }
    </script>
</body>
</html>
